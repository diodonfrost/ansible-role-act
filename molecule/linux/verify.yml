---
- name: Verify
  hosts: all
  tasks:
    - name: Linux | act should be functionnal
      ansible.builtin.command: act --version
      register: act_result
      changed_when: false

    - name: Linux | Verify commands outputs
      ansible.builtin.assert:
        that:
          - act_result.rc == 0
        success_msg: "All tests passed"
